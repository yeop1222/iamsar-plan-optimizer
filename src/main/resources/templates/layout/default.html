<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>IAMSAR Search Plan Optimizer</title>

    <!-- OpenLayers 7.2.2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@7.2.2/ol.css"/>
    <script src="https://cdn.jsdelivr.net/npm/ol@7.2.2/dist/ol.js"></script>

    <!-- jQuery 3.6.3 -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.3/dist/jquery.min.js"></script>

    <!-- proj4js -->
    <script src="https://cdn.jsdelivr.net/npm/proj4@2.9.0/dist/proj4.js"></script>

    <!-- Turf.js 7 -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>

    <!-- Handlebars 4.7.7 -->
    <script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.7/dist/handlebars.min.js"></script>

    <!-- Font Awesome 6.4.0 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>

    <!-- App CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

    <!-- Header -->
    <header class="header-bar">
        <h1>IAMSAR Search Plan Optimizer</h1>
    </header>

    <!-- Content -->
    <div class="app-container">
        <div layout:fragment="content"></div>
    </div>

    <!-- App JS (deferred) -->
    <div layout:fragment="scripts"></div>

</body>
</html>
